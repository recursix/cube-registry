id: arithmetic-cube
name: Arithmetic Cube
version: "0.1.0"
description: >
  A minimal arithmetic benchmark that asks agents to evaluate simple integer
  expressions (addition, subtraction, multiplication) and submit the correct
  answer. Designed as a self-contained example with no external services or
  VM requirements — pure Python, runs anywhere.
package: arithmetic-cube

dev_install_url: "git+https://github.com/The-AI-Alliance/cube-harness#subdirectory=cubes/arithmetic-cube"

authors:
- github: NicolasAG
  name: Nicolas Gontier

legal:
  wrapper_license: MIT

tags: [math]

max_concurrent_tasks: 64
parallelization_mode: task-parallel

status: active
has_debug_task: true
has_debug_agent: true
resources: []
task_count: 4
action_space: []
features:
  async: false
  streaming: false
  multi_agent: false
  multi_dim_reward: false
